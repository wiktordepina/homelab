---
- name: Create Signum Miner Folder
  ansible.builtin.file:
    path: /etc/signum-miner
    state: directory
    mode: '0755'

- name: Install Signum Miner
  ansible.builtin.get_url:
    url: "https://github.com/signum-network/signum-miner/releases/download/v{{ signum_miner_version }}/signum-miner-{{ signum_miner_variant }}"
    dest: "/etc/signum-miner/signum-miner-{{ signum_miner_version }}-{{ signum_miner_variant }}"
    mode: '0755'

- name: Link Signum Miner binary to stable path
  ansible.builtin.file:
    src: "/etc/signum-miner/signum-miner-{{ signum_miner_version }}-{{ signum_miner_variant }}"
    dest: /etc/signum-miner/signum-miner
    state: link
    force: true
  notify: Restart signum-miner

- name: Create Signum Miner Config
  ansible.builtin.template:
    src: config.yaml
    dest: /etc/signum-miner/config.yaml
    mode: '0644'
  notify: Restart signum-miner

- name: Create Signum Miner Service
  ansible.builtin.template:
    src: signum-miner.service
    dest: /etc/systemd/system/signum-miner.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart signum-miner

- name: Enable Signum Miner Service
  ansible.builtin.systemd:
    name: signum-miner
    enabled: true
    state: started

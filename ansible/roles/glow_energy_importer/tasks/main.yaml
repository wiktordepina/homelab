---
- name: Install system packages
  ansible.builtin.apt:
    name:
      - python3-venv
      # ansible.builtin.pip imports `packaging` on the target to parse
      # version specifiers; Debian 13's stock python3.13 does not ship it,
      # so the apt package is required for the pip task below to work.
      - python3-packaging
    state: present
    update_cache: true

- name: System user
  ansible.builtin.user:
    name: glow-energy-importer
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/glow-energy-importer
    create_home: false

- name: Install directory
  ansible.builtin.file:
    path: /opt/glow-energy-importer
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Python venv
  ansible.builtin.command: python3 -m venv /opt/glow-energy-importer/venv
  args:
    creates: /opt/glow-energy-importer/venv/bin/python

- name: Requirements file
  ansible.builtin.copy:
    src: requirements.txt
    dest: /opt/glow-energy-importer/requirements.txt
    owner: root
    group: root
    mode: "0644"

# Always run pip; the module is idempotent so already-installed packages
# are a no-op. Gating on the requirements file's `changed` state was
# tempting for speed but produced empty venvs whenever a prior run wrote
# the file and then failed before pip — the next run saw the file
# unchanged and skipped pip, leaving the daemon importing missing libs.
- name: Install Python dependencies
  ansible.builtin.pip:
    requirements: /opt/glow-energy-importer/requirements.txt
    virtualenv: /opt/glow-energy-importer/venv
  notify:
    - Restart glow-energy-importer

- name: Daemon script
  ansible.builtin.copy:
    src: glow_energy_importer.py
    dest: /opt/glow-energy-importer/glow_energy_importer.py
    owner: root
    group: root
    mode: "0755"
  notify:
    - Restart glow-energy-importer

- name: Config directory
  ansible.builtin.file:
    path: /etc/glow-energy-importer
    state: directory
    owner: root
    group: glow-energy-importer
    mode: "0750"

- name: Config file
  ansible.builtin.template:
    src: config.yml.j2
    dest: /etc/glow-energy-importer/config.yml
    owner: root
    group: glow-energy-importer
    mode: "0640"
  notify:
    - Restart glow-energy-importer

- name: Glowmarkt account password file
  ansible.builtin.copy:
    content: "{{ lookup('ansible.builtin.env', glow_energy_importer_password_env) }}"
    dest: /etc/glow-energy-importer/glow_password
    owner: root
    group: glow-energy-importer
    mode: "0640"
  no_log: true
  notify:
    - Restart glow-energy-importer

- name: Home Assistant token file
  ansible.builtin.copy:
    content: "{{ lookup('ansible.builtin.env', glow_energy_importer_ha_token_env) }}"
    dest: /etc/glow-energy-importer/ha_token
    owner: root
    group: glow-energy-importer
    mode: "0640"
  no_log: true
  notify:
    - Restart glow-energy-importer

- name: Systemd unit
  ansible.builtin.template:
    src: glow-energy-importer.service.j2
    dest: /etc/systemd/system/glow-energy-importer.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart glow-energy-importer

- name: Enable service
  ansible.builtin.systemd:
    name: glow-energy-importer
    enabled: true
    state: started
    daemon_reload: true

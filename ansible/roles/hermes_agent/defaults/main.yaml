---
hermes_version: "v2026.5.7"
hermes_repo: "https://github.com/NousResearch/hermes-agent.git"

hermes_user: hermes
hermes_group: hermes

hermes_install_dir: /opt/hermes-agent
hermes_home: /mnt/hermes
hermes_config_dir: /etc/hermes
hermes_binary_link: /usr/local/bin/hermes

hermes_gateway_port: 8642
hermes_dashboard_port: 9119

hermes_litellm_endpoint: "http://10.20.1.207:4000"
hermes_default_model: "anthropic/claude-sonnet-4-6"

# Source subnets allowed inbound on any port (RFC1918 ranges visible on the
# homelab). Outbound is pragmatic: 80/443 anywhere plus named internal
# services on their API ports.
hermes_lan_subnets:
  - 10.20.0.0/16
  - 192.168.250.0/16
  - 10.10.250.0/16
  - 10.50.250.0/16
  - 192.168.200.0/24

# Named internal homelab services Hermes is permitted to reach on their API
# ports. LLM traffic always goes through the LiteLLM endpoint above, never
# directly to upstream providers.
hermes_internal_egress:
  - { host: 10.20.1.207, port: 4000 }   # litellm
  - { host: 10.20.1.216, port: 2222 }   # forgejo SSH (git push/pull)
  - { host: 10.20.1.216, port: 3000 }   # forgejo HTTP API
  - { host: 10.20.1.210, port: 3000 }   # grafana
  - { host: 10.20.1.206, port: 8123 }   # homeassistant

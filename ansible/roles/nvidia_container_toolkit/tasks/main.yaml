---
# nvidia-container-toolkit lets the docker runtime expose the host's
# NVIDIA driver to containers. It runs *inside* an LXC (or any host)
# that runs docker workloads with GPU access — it is not relevant on
# the PVE host or in a container that uses the GPU directly (e.g.
# Jellyfin's native install).

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Install NVIDIA container toolkit GPG key
  ansible.builtin.get_url:
    url: https://nvidia.github.io/libnvidia-container/gpgkey
    dest: /etc/apt/keyrings/nvidia-container-toolkit.asc
    mode: "0644"

- name: Add NVIDIA container toolkit apt source
  ansible.builtin.copy:
    src: nvidia-container-toolkit.list
    dest: /etc/apt/sources.list.d/nvidia-container-toolkit.list
    mode: "0644"
  register: nvidia_container_toolkit_repo

- name: Refresh apt cache after adding NVIDIA container toolkit repo
  ansible.builtin.apt:
    update_cache: true
  when: nvidia_container_toolkit_repo.changed

- name: Install nvidia-container-toolkit
  ansible.builtin.apt:
    name: nvidia-container-toolkit
    state: present
  register: nvidia_container_toolkit

- name: Configure docker runtime for nvidia
  ansible.builtin.command: nvidia-ctk runtime configure --runtime=docker
  when: nvidia_container_toolkit.changed

- name: Restart docker
  ansible.builtin.service:
    name: docker
    enabled: true
    state: restarted
  when: nvidia_container_toolkit.changed

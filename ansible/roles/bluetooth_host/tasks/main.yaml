---
- name: Persist bluetooth kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/bluetooth.conf
    content: |
      bluetooth
      btusb
    owner: root
    group: root
    mode: "0644"

- name: Load bluetooth core module
  ansible.builtin.modprobe:
    name: bluetooth
    state: present

- name: Load btusb USB-adapter driver
  ansible.builtin.modprobe:
    name: btusb
    state: present

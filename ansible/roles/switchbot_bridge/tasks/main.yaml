---
- name: Install system packages
  ansible.builtin.apt:
    name:
      - python3-venv
      # ansible.builtin.pip imports `packaging` on the target to parse
      # version specifiers; Debian 13's stock python3.13 does not ship it,
      # so the apt package is required for the pip task below to work.
      - python3-packaging
      - bluez
      - dbus
    state: present
    update_cache: true

- name: Bluetooth daemon
  ansible.builtin.systemd:
    name: bluetooth
    enabled: true
    state: started

- name: System user
  ansible.builtin.user:
    name: switchbot-bridge
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/switchbot-bridge
    create_home: false
    groups:
      - bluetooth
    append: true

- name: Install directory
  ansible.builtin.file:
    path: /opt/switchbot-bridge
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Python venv
  ansible.builtin.command: python3 -m venv /opt/switchbot-bridge/venv
  args:
    creates: /opt/switchbot-bridge/venv/bin/python

- name: Requirements file
  ansible.builtin.copy:
    src: requirements.txt
    dest: /opt/switchbot-bridge/requirements.txt
    owner: root
    group: root
    mode: "0644"
  register: requirements_file

- name: Install Python dependencies
  ansible.builtin.pip:
    requirements: /opt/switchbot-bridge/requirements.txt
    virtualenv: /opt/switchbot-bridge/venv
  when: requirements_file.changed
  notify:
    - Restart switchbot-bridge

- name: Daemon script
  ansible.builtin.copy:
    src: switchbot_bridge.py
    dest: /opt/switchbot-bridge/switchbot_bridge.py
    owner: root
    group: root
    mode: "0755"
  notify:
    - Restart switchbot-bridge

- name: Config directory
  ansible.builtin.file:
    path: /etc/switchbot-bridge
    state: directory
    owner: root
    group: switchbot-bridge
    mode: "0750"

- name: Config file
  ansible.builtin.template:
    src: config.yml.j2
    dest: /etc/switchbot-bridge/config.yml
    owner: root
    group: switchbot-bridge
    mode: "0640"
  notify:
    - Restart switchbot-bridge

- name: MQTT password file
  ansible.builtin.copy:
    content: "{{ lookup('ansible.builtin.env', switchbot_bridge_mqtt_password_env) }}"
    dest: /etc/switchbot-bridge/mqtt_password
    owner: root
    group: switchbot-bridge
    mode: "0640"
  no_log: true
  notify:
    - Restart switchbot-bridge

- name: Systemd unit
  ansible.builtin.template:
    src: switchbot-bridge.service.j2
    dest: /etc/systemd/system/switchbot-bridge.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart switchbot-bridge

- name: Enable service
  ansible.builtin.systemd:
    name: switchbot-bridge
    enabled: true
    state: started
    daemon_reload: true

---
# NVIDIA proprietary driver via Debian's non-free repo, using the Tesla
# 535 LTSB packages. 535 is NVIDIA's Long-Term Support Branch — the only
# branch that still supports older GPUs (Pascal P-series, Quadro,
# GTX 10xx) AND tracks current kernel ABI changes. The standard
# nvidia-driver package (550.x in trixie/non-free) does not yet build
# against kernel 6.17; the 590+ branches in NVIDIA's CUDA repo dropped
# Pascal entirely.
#
# Same source on host and LXC keeps kernel module and userspace libs in
# lockstep.

# Host: kernel headers for the running kernel SERIES (e.g. 6.17). Series
# meta-packages survive point-release upgrades (6.17.13-4 → 6.17.13-7
# without intervention) but do NOT chase a major bump (6.17 → 7.0) that
# the driver may not yet support. nvidia-tesla-535-driver pulls the DKMS
# kernel module package, the userspace stack, and the persistence
# daemon.
- name: Install kernel module + userspace (host)
  ansible.builtin.apt:
    name: "{{ gpu_drivers_host_packages }}"
    state: present
  vars:
    gpu_drivers_kernel_series: "{{ ansible_kernel.split('.')[:2] | join('.') }}"
    gpu_drivers_host_packages:
      - "proxmox-headers-{{ gpu_drivers_kernel_series }}"
      - nvidia-tesla-535-driver
      - nvidia-tesla-535-kernel-dkms
  when: gpu_drivers_install_kernel_module

- name: Load nvidia kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - nvidia
    - nvidia_uvm
    - nvidia_modeset
  when: gpu_drivers_install_kernel_module

# LXC: userspace bits sufficient for hardware-accelerated transcoding
# (Jellyfin's ffmpeg path). encode1 = NVENC, nvcuvid1 = NVDEC, smi for
# diagnostics. The kernel module is supplied by the host via the
# bind-mounted /dev/nvidia* device files declared in the container's
# pve_extra section.
- name: Install userspace driver (LXC)
  ansible.builtin.apt:
    name:
      - nvidia-tesla-535-smi
      - libnvidia-tesla-535-encode1
      - libnvidia-tesla-535-nvcuvid1
    state: present
  when: not gpu_drivers_install_kernel_module

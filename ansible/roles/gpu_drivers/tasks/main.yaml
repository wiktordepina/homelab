---
# NVIDIA proprietary driver via apt, sourced from NVIDIA's CUDA repo.
# Same source for the PVE host (kernel module + userspace) and any LXC
# that needs only userspace (transcoding, CUDA workloads). Locking both
# sides to one repo means kernel module and userspace libs cannot drift
# apart across kernel upgrades.

- name: Install NVIDIA repo keyring
  ansible.builtin.apt:
    deb: "{{ gpu_drivers_nvidia_repo_base }}/cuda-keyring_1.1-1_all.deb"

- name: Add NVIDIA CUDA apt source
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/nvidia-cuda.sources
    mode: "0644"
    content: |
      Types: deb
      URIs: {{ gpu_drivers_nvidia_repo_base }}/
      Suites: /
      Signed-By: /usr/share/keyrings/cuda-archive-keyring.gpg
  register: gpu_drivers_repo

- name: Refresh apt cache after adding NVIDIA repo
  ansible.builtin.apt:
    update_cache: true
  when: gpu_drivers_repo.changed

# nouveau and the proprietary driver cannot share a card. Blacklist it
# wherever the kernel module will be loaded; harmless inside an LXC.
- name: Blacklist nouveau
  ansible.builtin.copy:
    dest: /etc/modprobe.d/blacklist-nouveau.conf
    mode: "0644"
    content: |
      blacklist nouveau
      options nouveau modeset=0
  when: gpu_drivers_install_kernel_module
  register: gpu_drivers_nouveau

- name: Rebuild initramfs after blacklisting nouveau
  ansible.builtin.command: update-initramfs -u
  when: gpu_drivers_nouveau.changed

# Host: kernel headers tracking the running kernel, then the full driver
# meta-package (DKMS module + userspace + nvidia-persistenced). DKMS
# rebuilds the module on every kernel upgrade as long as the headers
# meta-package is in place.
- name: Install kernel module + userspace (host)
  ansible.builtin.apt:
    name:
      - proxmox-default-headers
      - cuda-drivers
    state: present
  when: gpu_drivers_install_kernel_module
  register: gpu_drivers_host_install

- name: Load nvidia kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - nvidia
    - nvidia_uvm
    - nvidia_modeset
  when: gpu_drivers_install_kernel_module

- name: Enable nvidia-persistenced
  ansible.builtin.systemd:
    name: nvidia-persistenced
    enabled: true
    state: started
  when: gpu_drivers_install_kernel_module

# LXC: userspace only. nvidia-driver-cuda pulls libnvidia-encode1,
# libnvcuvid1, nvidia-smi, and the persistence daemon — everything
# Jellyfin's NVENC/NVDEC path needs. The kernel module is supplied by
# the host via the bind-mounted /dev/nvidia* device files declared in
# the container's pve_extra section.
- name: Install userspace driver (LXC)
  ansible.builtin.apt:
    name:
      - nvidia-driver-cuda
    state: present
  when: not gpu_drivers_install_kernel_module

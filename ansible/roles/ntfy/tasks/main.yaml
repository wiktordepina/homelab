---
- name: Keyrings folder
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory

- name: Instal gpg
  ansible.builtin.apt:
    name: gpg
    state: present

# The heckel.io apt repo was retired in 2025 and its Release file 404s, which
# breaks `apt update`. Remove the stale source + keyring before touching apt.
- name: Remove retired heckel.io apt repo
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/archive.heckel.io.list
    - /etc/apt/keyrings/archive.heckel.io.gpg

- name: Ntfy apt signing key
  ansible.builtin.get_url:
    url: https://archive.ntfy.sh/apt/keyring.gpg
    dest: /etc/apt/keyrings/ntfy.gpg
    mode: "0644"

- name: Instal apt-transport-https
  ansible.builtin.apt:
    name: apt-transport-https
    state: present

- name: Ntfy apt repo
  ansible.builtin.copy:
    src: archive.ntfy.sh.list
    dest: /etc/apt/sources.list.d/archive.ntfy.sh.list

- name: Install Ntfy.sh
  ansible.builtin.apt:
    update_cache: yes
    name: ntfy
    state: present

- name: Cache file
  ansible.builtin.file:
    path: /var/cache/ntfy/cache.db
    owner: ntfy
    group: ntfy
    state: touch
  notify:
    - Restart Ntfy

- name: Auth file
  ansible.builtin.file:
    path: /var/lib/ntfy/user.db
    owner: ntfy
    group: ntfy
    state: touch
  notify:
    - Restart Ntfy

- name: Config file
  ansible.builtin.template:
    src: server.yml.j2
    dest: /etc/ntfy/server.yml
  notify:
    - Restart Ntfy

- name: Enable service
  ansible.builtin.service:
    name: ntfy
    enabled: true
    state: started

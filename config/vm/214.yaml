---
# General-purpose VM #1. Hosts workloads that need a real kernel rather than
# an LXC's shared one — currently the SwitchBot BLE → MQTT bridge, which has
# to live in a VM because the kernel scopes AF_BLUETOOTH to init_net and the
# host kernel is intentionally minimal. Additional small services that fit
# the same bill (kernel modules, Bluetooth, USB pass-through) land here too;
# vm-02 is the obvious extension once vm-01 is full or a workload genuinely
# wants its own host.
terraform:
  vmid: 214
  hostname: vm-01
  ip_address: 10.20.1.214/16
  nameserver: 10.20.0.1
  cpu_core_count: 1
  memory: 512
  start_on_boot: true
  rootfs_size: 4G
  usb_passthrough:
    # UGREEN BT5.4 USB adapter. The dongle must be physically plugged
    # into the Proxmox host before apply; QEMU forwards it to the guest
    # by vendor:product, so the USB port on the host does not matter.
    # An earlier TP-Link UB500 V2 (37ad:0600) was abandoned because that
    # PID is not in mainline btusb's quirk table — btrtl never loaded
    # the firmware and the chip stayed dead. The UGREEN reports BT 5.4
    # and initialises cleanly on stock Debian kernels.
    - host: "33fa:0010"

ansible:
  roles:
    - base
    - role: switchbot_bridge
      vars:
        switchbot_bridge_mqtt_host: mosquitto.home.matagoth.com
        switchbot_bridge_mqtt_username: switchbot-bridge
        switchbot_bridge_mqtt_password_env: MOSQUITTO_PASSWORD_SWITCHBOT_BRIDGE
        switchbot_bridge_devices:
          - mac: "CA:05:48:2B:09:A4"
            friendly_name: "Bathroom"
          - mac: "E8:22:5F:FF:F7:47"
            friendly_name: "Downstairs Toilet"
          - mac: "C5:34:C8:79:AF:6E"
            friendly_name: "En Suite"
          - mac: "F9:5F:26:A4:29:95"
            friendly_name: "Kitchen"
          - mac: "F7:98:CE:01:69:74"
            friendly_name: "Spare Bedroom"
    - role: signum_mqtt_bridge
      vars:
        signum_mqtt_bridge_account_id: "3033777005113980426"
        signum_mqtt_bridge_mqtt_host: mosquitto.home.matagoth.com
        signum_mqtt_bridge_mqtt_username: signum-bridge
        signum_mqtt_bridge_mqtt_password_env: MOSQUITTO_PASSWORD_SIGNUM_BRIDGE

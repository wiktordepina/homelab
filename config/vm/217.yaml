---
# Hermes Agent — sandboxed AI gateway. A VM rather than an LXC because the
# agent's terminal backend uses Docker; running dockerd inside an unprivileged
# LXC works but the lifecycle is fiddly enough that a real kernel earns its
# keep here. Sized to match the old custom mait-gateway VM it replaces
# (6 vCPU / 12 GiB).
#
# No extra mounts: state that needs to persist (skills, memories, config) is
# pushed to dedicated repos on the homelab Forgejo (216) and pulled back on
# rebuild. Everything else is rootfs — which already lives on the ZFS zpool
# via the VM's local-zpool storage. The 250 GiB rootfs gives the agent room
# for many docker image layers, large build scratch, and incidental artefacts
# before any are committed to git.
terraform:
  vmid: 217
  hostname: hermes
  ip_address: 10.20.1.217/16
  nameserver: 10.20.0.1
  cpu_core_count: 6
  memory: 12288
  start_on_boot: true
  rootfs_size: 250G

ansible:
  roles:
    - base
    - docker
    - hermes_agent

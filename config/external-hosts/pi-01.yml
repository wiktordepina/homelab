---
identity:
  hostname: pi-01
  fqdn: pi-01.home.matagoth.com
  ip: 10.10.50.10
  ssh_user: root

manually_provisioned:
  - operating_system        # Raspberry Pi OS Lite (64-bit)
  - network_configuration   # static IP 10.10.50.10
  - ssh_authorized_keys     # github-worker public key in /root/.ssh/authorized_keys

ansible:
  roles:
    - base

notes: |
  Raspberry Pi 4B (8GB RAM). General-purpose external host.
  Lives outside the Proxmox host because some intended workloads
  (GPIO sensors and actuators) need hardware the hypervisor does
  not have. Numbered pi-NN so a future pi-02 is the obvious
  extension.

  No service-specific role currently applied — the host is kept
  running base only, against future GPIO use. The SwitchBot BLE
  bridge previously ran here; once a USB BT dongle was available,
  the bridge moved to LXC 214 (config/lxc/214.yaml) so it could
  share the Proxmox host's resources rather than tying up a
  dedicated piece of hardware.

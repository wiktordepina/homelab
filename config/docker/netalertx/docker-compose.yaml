---
services:
  netalertx:
    image: ghcr.io/jokob-sk/netalertx:latest
    container_name: netalertx
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
      - NET_BIND_SERVICE
    environment:
      - TZ=Europe/London
      - PORT=20211
    volumes:
      - /mnt/netalertx:/data
      - /etc/localtime:/etc/localtime:ro
